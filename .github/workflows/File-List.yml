name: Generate File List

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run PowerShell Command
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -File | Select-Object FullName > file_list.txt

    - name: Upload File List Artifact
      uses: actions/upload-artifact@v4
      with:
        name: repository-file-list
        path: file_list.txt
        retention-days: 5
